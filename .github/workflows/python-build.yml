name: Build and Release Python Executable

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync

      - name: Build Executable
        run: uv run pyinstaller --onefile --name sprite-stacker main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: sprite-stacker.exe
          path: dist/sprite-stacker.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          name: sprite-stacker.exe

      - name: List Files for Debugging
        run: ls -la

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest"
          git tag -f "$TAG"
          git push origin "$TAG" --force
          gh release delete "$TAG" --yes || true
          gh release create "$TAG" \
            --title "Latest" \
            --notes "This release always contains the latest executable built from the main branch." \
            --draft=false \
            --prerelease=false
          gh release upload "$TAG" ./sprite-stacker.exe --clobber
